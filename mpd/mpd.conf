music_directory    "~/Музыка"
playlist_directory "~/.config/mpd/playlists"
db_file            "~/.config/mpd/database"
log_file           "~/.config/mpd/log"
pid_file           "~/.config/mpd/pid"
state_file         "~/.config/mpd/state"

audio_output {
    type            "pipewire"
    name            "PipeWire Output"   # Сделайте имя уникальным
    mixer_type      "software"
}

audio_output {
    type            "fifo"
    name            "Visualizer FIFO"   # И здесь тоже другое имя
    path            "/tmp/mpd.fifo"
    format          "44100:16:2"
}
