# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

source = ~/.cache/wal/colors-hyprland.conf

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf
source = /home/dmitrj/.cache/wal/colors-hyprland.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,highres,auto,1


###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

exec-once = sleep 2 && waybar
exec-once = awww-daemon
exec-once = waypaper --restore
exec-once = mpd && sleep 2 && mpd-mpris &

#############################
### ENVIRONMENT VARIABLES ###
#############################

# kostbIly for Nvidia

# env = XCURSOR_SIZE,20
# env = HYPRCURSOR_SIZE,20
# env = LIBVA_DRIVER_NAME,nvidia
# env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_DRM_NO_ATOMIC,1

# курсор(если скачан)

# env = HYPRCURSOR_THEME,rose-pine-hyprcursor

###################
### PERMISSIONS ###
###################

# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 1

    col.active_border = $color4 $color2 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

     allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 0.8
    inactive_opacity = 0.7

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 1


        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 4, myBezier, fade

}

cursor {
    inactive_timeout = 0.1
}

# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

dwindle {
pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle,caps:shift_capslock 
    kb_rules =
    repeat_delay = 400
    repeat_rate = 80 
    scroll_method = on_button_down
    scroll_button = 276    

    follow_mouse = 1

    #sensitivity = 0.7 # -1.0 - 1.0, 0 means no modification.
    #scroll_factor = 1.0
    #force_no_accel = true
    #follow_mouse = 1

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
       name = epic-mouse-v1
       sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, K, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, exec, librewolf
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, Space, resizeactive, exact 1400 900
bind = $mainMod, Space, centerwindow,
bind = $mainMod, O, exec, kitty -e nvim


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Based binds
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, A, exec, rofi -show drun
bind = $mainMod, f11, fullscreen

# Switch workspaces with mainMod + [1-0]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [1-0]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
#bind = $mainMod , K, movetoworkspace, special
#bind = $mainMod, S, togglespecialworkspace

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 3%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 3%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 3%-
bindl = ,Insert, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 3%+
bindl = ,Home, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-

# Mpc
bindl = , code:127, exec, mpc toggle
bindl = , Next, exec, mpc next
bindl = , Delete, exec, mpc prev
# Mpc2
bindl = , XF86AudioPause, exec, mpc toggle
bindl = , XF86AudioPlay, exec, mpc toggle
bindl = , XF86AudioNext, exec, mpc next
bindl = , XF86AudioPrev, exec, mpc prev


# Move window on monitor
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# Resise Win + Alt + arrows
binde = $mainMod ALT, right, resizeactive, 70 0
binde = $mainMod ALT, left, resizeactive, -70 0
binde = $mainMod ALT, up, resizeactive, 0 -70
binde = $mainMod ALT, down, resizeactive, 0 70

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Hyprland-run windowrule(for other window(easy for be supplemented)) 

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = firefox-custom
    match:class = ^(firefox)$
    float = true
    size = 1400 900
    center = yes
}

windowrule {
    name = chromium 
    match:class = ^(chromium)$
    float = true
    size = 1400 900
    center = yes
}

windowrule  {
    name = vesktop
    match:class = ^(vesktop)$
    float = true 
    size = 1400 900
    center = yes
}

windowrule {
    name = librewolf
    match:class = ^(librewolf)$
    float = true 
    size = 1400 900
    center = yes
}
